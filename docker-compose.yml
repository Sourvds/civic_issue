version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: localpulse-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - localpulse

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localpulse-backend
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/localpulse
      JWT_SECRET: your-secret-key-here
      AI_ENGINE_URL: http://ai-engine:5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - localpulse
    restart: unless-stopped

  # AI Engine
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: localpulse-ai
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    networks:
      - localpulse
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localpulse-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    networks:
      - localpulse
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  localpulse:
    driver: bridge
